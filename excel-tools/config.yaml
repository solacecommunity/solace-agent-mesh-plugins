# Plugin Metadata:
# Name: excel-tools
# Version: 0.3.0
# Description: Read, write, analyze, automate, and reproduce calculations in Excel spreadsheets. Includes cron-style scheduled recalculation, batch scenario analysis, template stamping, and more.
# Author: Raphael Caillon
#
# --- Start of Agent Configuration Template ---
# Solace Agent Mesh: Plugin Configuration Template
#
# This file serves as a template for creating new agent configurations from this plugin.
# Use placeholders like __COMPONENT_KEBAB_CASE_NAME__, __COMPONENT_PASCAL_CASE_NAME__,
# and __COMPONENT_UPPER_SNAKE_CASE_NAME__ where the specific component name should be inserted.

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: __COMPONENT_KEBAB_CASE_NAME__.log

# To use the `shared_config.yaml` file, uncomment the following line and remove the `shared_config` section below.
# !include ../shared_config.yaml
shared_config:
  - broker_connection: &broker_connection
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
      broker_username: ${SOLACE_BROKER_USERNAME, default}
      broker_password: ${SOLACE_BROKER_PASSWORD, default}
      broker_vpn: ${SOLACE_BROKER_VPN, default}
      temporary_queue: ${USE_TEMPORARY_QUEUES, true}

  - models:
    general: &general_model
      model: ${LLM_SERVICE_GENERAL_MODEL_NAME}
      api_base: ${LLM_SERVICE_ENDPOINT}
      api_key: ${LLM_SERVICE_API_KEY}

  - services:
    session_service: &default_session_service
      type: "memory"
      default_behavior: "PERSISTENT"

    artifact_service: &default_artifact_service
      type: "filesystem"
      base_path: "/tmp/samv2"
      artifact_scope: namespace

apps:
  - name: __COMPONENT_KEBAB_CASE_NAME__-app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: "${NAMESPACE}"
      supports_streaming: false
      agent_name: "__COMPONENT_PASCAL_CASE_NAME__"
      display_name: "__COMPONENT_PASCAL_CASE_NAME__"
      model: *general_model

      instruction: |
        You are a specialized Excel spreadsheet agent. You help users read,
        analyze, modify, automate, and reproduce calculations in Excel
        workbooks (.xlsx files) without needing Microsoft Excel.

        Core Capabilities:
        - List sheets, read cell values and ranges, extract formulas
        - Evaluate all formulas using a pure-Python calculation engine
        - Run "what-if" scenarios by changing input cells and recalculating
        - Write values or formulas to cells, create new workbooks
        - Provide structural analysis with column types, statistics, and formula maps

        Automation & Scheduling:
        - Schedule recurring recalculations (cron jobs) that run at fixed intervals
        - List and cancel running scheduled jobs
        - Run batch scenario analysis (multiple what-if cases in one call)
        - Stamp templates with new data to produce filled reports
        - Compare two workbooks cell-by-cell to find differences
        - Validate formulas for errors (#REF!, #DIV/0!, etc.)
        - Export sheet data to JSON for pipeline integration
        - Snapshot/freeze formulas to their computed values

        How to Respond:
        - When a user asks to "open" or "look at" a file, start with analyze_sheet
          to give them an overview, then read specific ranges as needed.
        - When asked about formulas, use get_formulas to show them, and
          evaluate_formulas to compute their results.
        - For "what-if" questions ("what happens if revenue is 500k?"), use
          recalculate with the new inputs and return the changed outputs.
        - For multiple scenarios ("compare low/mid/high pricing"), use
          batch_recalculate to run them all at once.
        - When a user wants recurring updates ("recalculate every hour"),
          use schedule_recalculation and confirm the job ID.
        - For comparing versions of a file, use diff_workbooks.
        - For generating reports from a template, use apply_template.
        - Always present numbers clearly with context (units, percentages, etc.)
          when the column headers imply them.
        - If the file path is relative, resolve it against the current working
          directory.

        Important Notes:
        - Formula evaluation runs in pure Python — no Excel installation required.
        - Large sheets are truncated to 200 rows by default; tell the user if
          data was truncated and offer to read specific ranges.
        - When writing, offer to save as a new file to preserve the original.
        - Scheduled jobs run as background threads and persist until cancelled
          or the agent restarts.

      tools:
        - group_name: artifact_management
          tool_type: builtin-group

        # --- Core tools ---

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: list_sheets
          tool_description: "List all sheet names in an Excel workbook"
          artifact_args: ["file_path"]
          tool_config: {}

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: read_range
          tool_description: "Read cell values and optionally formulas from an Excel range or entire sheet"
          artifact_args: ["file_path"]
          tool_config: {}

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: get_formulas
          tool_description: "Extract all formula strings from a sheet or range, returning a cell-to-formula mapping"
          artifact_args: ["file_path"]
          tool_config: {}

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: evaluate_formulas
          tool_description: "Evaluate Excel formulas in pure Python and return computed results — no Excel installation needed"
          artifact_args: ["file_path"]
          tool_config: {}

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: recalculate
          tool_description: "Change input cell values and recalculate the entire spreadsheet to see updated outputs (what-if analysis)"
          artifact_args: ["file_path"]
          tool_config: {}

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: analyze_sheet
          tool_description: "Return a structural summary of a sheet: dimensions, headers, column types, statistics, and formula locations"
          artifact_args: ["file_path"]
          tool_config: {}

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: write_cells
          tool_description: "Write values or formulas to specific cells and save the workbook"
          artifact_args: ["file_path"]
          tool_config: {}

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: create_workbook
          tool_description: "Create a new Excel workbook with optional headers and data rows"
          tool_config: {}

        # --- Scheduling / cron tools ---

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: schedule_recalculation
          tool_description: "Schedule a recurring recalculation of a workbook at a fixed interval (cron job). Optionally persist results to a separate file."
          tool_config: {}

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: list_scheduled_jobs
          tool_description: "List all active scheduled recalculation jobs with their status and run history"
          tool_config: {}

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: cancel_scheduled_job
          tool_description: "Cancel a running scheduled recalculation job by its ID"
          tool_config: {}

        # --- Advanced automation tools ---

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: batch_recalculate
          tool_description: "Run multiple what-if scenarios in one call for sensitivity or scenario analysis"
          artifact_args: ["file_path"]
          tool_config: {}

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: copy_sheet
          tool_description: "Duplicate a sheet within the same workbook or copy it to another workbook"
          artifact_args: ["file_path"]
          tool_config: {}

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: apply_template
          tool_description: "Stamp a template workbook with new values and save a filled copy — formulas are preserved"
          artifact_args: ["template_path"]
          tool_config: {}

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: diff_workbooks
          tool_description: "Compare two workbooks cell-by-cell and return all differences"
          artifact_args: ["file_a", "file_b"]
          tool_config: {}

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: validate_formulas
          tool_description: "Check every formula for errors (#REF!, #DIV/0!, #NAME?, etc.) and report issues"
          artifact_args: ["file_path"]
          tool_config: {}

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: export_sheet_to_json
          tool_description: "Export sheet data as JSON (records, columns, or rows) for pipeline integration"
          artifact_args: ["file_path"]
          tool_config: {}

        - tool_type: python
          component_module: "excel_tools.tools"
          function_name: snapshot_formulas
          tool_description: "Replace all formulas with their computed values to create a frozen point-in-time copy"
          artifact_args: ["file_path"]
          tool_config: {}

      session_service: *default_session_service
      artifact_service: *default_artifact_service

      artifact_handling_mode: "reference"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true

      agent_card:
        description: Excel spreadsheet agent that reads, writes, analyzes, automates, and reproduces calculations in .xlsx files. Supports scheduled cron-style recalculation, batch scenario analysis, template stamping, workbook diffing, formula validation, JSON export, and formula snapshots — all without requiring Microsoft Excel.
        defaultInputModes: ["text", "file"]
        defaultOutputModes: ["text", "file"]
        skills:
          - id: "list_sheets"
            name: "List Sheets"
            description: "List all sheet names in an Excel workbook."

          - id: "read_range"
            name: "Read Range"
            description: "Read cell values and optionally formulas from a range or entire sheet."

          - id: "get_formulas"
            name: "Get Formulas"
            description: "Extract formula strings from cells, returning a cell-to-formula mapping."

          - id: "evaluate_formulas"
            name: "Evaluate Formulas"
            description: "Evaluate all Excel formulas in pure Python and return computed results."

          - id: "recalculate"
            name: "Recalculate"
            description: "Change input values and recalculate the spreadsheet for what-if analysis."

          - id: "analyze_sheet"
            name: "Analyze Sheet"
            description: "Structural summary with dimensions, headers, column types, statistics, and formulas."

          - id: "write_cells"
            name: "Write Cells"
            description: "Write values or formulas to specific cells and save."

          - id: "create_workbook"
            name: "Create Workbook"
            description: "Create a new Excel workbook with optional headers and data."

          - id: "schedule_recalculation"
            name: "Schedule Recalculation"
            description: "Set up a recurring cron-style recalculation job."

          - id: "list_scheduled_jobs"
            name: "List Scheduled Jobs"
            description: "Show all active scheduled recalculation jobs."

          - id: "cancel_scheduled_job"
            name: "Cancel Scheduled Job"
            description: "Stop a running scheduled recalculation job."

          - id: "batch_recalculate"
            name: "Batch Recalculate"
            description: "Run multiple what-if scenarios at once for sensitivity analysis."

          - id: "copy_sheet"
            name: "Copy Sheet"
            description: "Duplicate a sheet within or across workbooks."

          - id: "apply_template"
            name: "Apply Template"
            description: "Fill a template workbook with new data and save a copy."

          - id: "diff_workbooks"
            name: "Diff Workbooks"
            description: "Compare two workbooks cell-by-cell."

          - id: "validate_formulas"
            name: "Validate Formulas"
            description: "Check formulas for errors like #REF!, #DIV/0!, etc."

          - id: "export_sheet_to_json"
            name: "Export to JSON"
            description: "Export sheet data as JSON for pipeline integration."

          - id: "snapshot_formulas"
            name: "Snapshot Formulas"
            description: "Replace formulas with computed values for a frozen copy."

      agent_card_publishing: { interval_seconds: 10 }
      agent_discovery: { enabled: false }
      inter_agent_communication:
        allow_list: []
        request_timeout_seconds: 30

      max_conversation_turns: 100
      conversation_timeout_seconds: 3600
      enable_tool_calling: true
      enable_artifact_creation: true
