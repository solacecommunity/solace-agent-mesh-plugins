# Plugin Metadata:
# Name: filesystem
# Version: 0.1.0
# Description: Secure file operations with configurable access controls for MCP
# Author: Leslie Fernando <leslie.fernando@solace.com>
# 
# --- Start of Agent Configuration Template ---
# Solace Agent Mesh: Plugin Configuration Template
#
# This file serves as a template for creating new agent configurations from this plugin.
# Use placeholders like __COMPONENT_KEBAB_CASE_NAME__, __COMPONENT_PASCAL_CASE_NAME__,
# and __COMPONENT_UPPER_SNAKE_CASE_NAME__ where the specific component name should be inserted.

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: __COMPONENT_KEBAB_CASE_NAME__.log

# To use the `shared_config.yaml` file, uncomment the following line and remove the `shared_config` section below.
# !include ../shared_config.yaml
shared_config:
  - broker_connection: &broker_connection
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
      broker_username: ${SOLACE_BROKER_USERNAME, default}
      broker_password: ${SOLACE_BROKER_PASSWORD, default}
      broker_vpn: ${SOLACE_BROKER_VPN, default}
      temporary_queue: ${USE_TEMPORARY_QUEUES, true}

  - models:
    general: &general_model
      # This dictionary structure tells ADK to use the LiteLlm wrapper.
      # 'model' uses the specific model identifier your endpoint expects.
      model: ${LLM_SERVICE_GENERAL_MODEL_NAME} # Use env var for model name
      # 'api_base' tells LiteLLM where to send the request.
      api_base: ${LLM_SERVICE_ENDPOINT} # Use env var for endpoint URL
      # 'api_key' provides authentication.
      api_key: ${LLM_SERVICE_API_KEY} # Use env var for API key

  - services:
    # Default session service configuration
    session_service: &default_session_service
      type: "memory"
      default_behavior: "PERSISTENT"
    
    # Default artifact service configuration
    artifact_service: &default_artifact_service
      type: "filesystem"
      base_path: "/tmp/samv2"
      artifact_scope: namespace # Or "namespace", "app", "custom"

apps:
  - name: __COMPONENT_KEBAB_CASE_NAME__-app
    app_base_path: . 
    app_module: solace_agent_mesh.agent.sac.app 
    broker:
      <<: *broker_connection

    # App Level Config
    app_config:
      namespace: "${NAMESPACE}" 
      supports_streaming: false 
      agent_name: "__COMPONENT_PASCAL_CASE_NAME__" 
      display_name: "__COMPONENT_PASCAL_CASE_NAME__"
      model: *general_model 

      instruction: |
        You are a specialized filesystem operations agent that provides secure, controlled access to file operations through the Model Context Protocol (MCP).

        Core Functions:
        - Read files and directories with configurable access controls
        - Write and create files in allowed directories
        - List directory contents and file information
        - Search for files with patterns
        - Move and manipulate files safely
        - Provide file metadata and statistics

        Security Features:
        - Configurable allowed directories to restrict access
        - Path validation to prevent directory traversal attacks
        - Read-only mode support for enhanced security
        - Comprehensive error handling and logging

        Use Cases You Handle:
        - "Read the contents of file X" - Securely read file contents
        - "List all files in directory Y" - Display directory contents
        - "Create a new file with this content" - Write new files
        - "Search for files matching pattern Z" - Find files by pattern
        - "Get information about file A" - Provide file metadata

        How to Respond:
        - Always verify paths are within allowed directories
        - Provide clear error messages for permission issues
        - Return structured data for easy consumption
        - Log all file operations for audit trails

        **Important Notes:**
        - File operations are restricted to configured allowed paths
        - Operations respect the read-only setting if enabled
        - Always validate and sanitize file paths
        - Provide informative error messages for failed operations

        Operate securely and efficiently within the configured access controls.

      tools:
        - tool_type: mcp
          connection_params:
            type: stdio
            command: "npx"
            args:
              - "-y"
              - "@modelcontextprotocol/server-filesystem"
              - "${FILESYSTEM_ALLOWED_PATH}"
